# PresenzeNfcService — configurazione
# Copia questo file come "config.ini" nella stessa cartella del .exe e
# compila i campi obbligatori.

[server]
# URL base del backend HR (no slash finale, http o https)
url = http://hr.lan.local:3000

# API key generata in: Impostazioni -> Chiavi API (mostrata una sola volta)
api_key = INCOLLA_QUI_LA_CHIAVE_API

# Timeout HTTP per ogni richiesta (millisecondi)
timeout_ms = 5000

[reader]
# Sottostringa del nome del lettore PC/SC da usare. Vuoto = primo trovato.
# Esegui "PresenzeNfcService.exe --probe" per vedere i nomi disponibili.
# Esempio bit4id: "Bit4id miniLector-AIR"
preferred_name =

# Debounce client-side: ignora tap consecutivi dello stesso UID entro N ms
debounce_ms = 2500

[log]
# Cartella di log. Vuoto = %ProgramData%\PresenzeNfcService\logs
path =
